<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
        #canvas { width: 100vw; height: 56.25vw; position: relative; }
        .stamped { 
            position: absolute; transform: translate(-50%, -50%); 
            animation: fadeIn 0.5s ease-out forwards; 
        }
        .fade-out { opacity: 0; transition: opacity 1s; }
        @keyframes fadeIn { from { opacity: 0; scale: 1.2; } to { opacity: 1; scale: 1; } }
    </style>
</head>
<body>
    <div id="canvas"></div>
    <script>
        // REPLACE 'my-secret-room-123' with a unique name for your stream
        const peer = new Peer('sqwigly'); 

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                const img = document.createElement('img');
                img.src = data.url;
                img.className = 'stamped';
                img.style.width = data.size + 'px';
                img.style.left = data.x + '%';
                img.style.top = data.y + '%';
                document.getElementById('canvas').appendChild(img);

                setTimeout(() => {
                    img.classList.add('fade-out');
                    setTimeout(() => img.remove(), 1000);
                }, 3000);
            });
        });
    </script>
</body>
</html>
